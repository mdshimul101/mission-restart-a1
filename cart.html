<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cart</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-gray-100">

  <div class="max-w-6xl mx-auto p-6">

    <h2 class="text-3xl font-bold mb-6"><i class="fa-solid fa-shopping-cart mr-2"></i> My Cart</h2>

    <!-- Cart Items -->
    <div id="cart-container" class="space-y-4"></div>

    <!-- Total -->
    <div class="bg-white p-5 rounded-lg shadow mt-6 flex justify-between items-center">
      <h3 class="text-xl font-semibold">Total Price:</h3>
      <h3 id="total-price" class="text-2xl font-bold text-indigo-600">$0</h3>
    </div>

  </div>

  <script src="cart.js"></script>
</body>
</html>
